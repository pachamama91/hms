<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapeco HMS</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #34495e; --accent: #3498db; --white: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; height: 100vh; background: #f4f7f6; }
        
        /* Login Overlay */
        #login-overlay { position: fixed; inset: 0; background: var(--primary); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-box { background: white; padding: 2rem; border-radius: 8px; text-align: center; width: 300px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        
        /* Layout */
        #sidebar { width: 220px; background: var(--primary); color: white; display: none; flex-direction: column; }
        #main-content { flex-grow: 1; display: none; flex-direction: column; overflow-y: auto; }
        
        /* Sidebar Menu */
        .logo-area { padding: 20px; text-align: center; border-bottom: 1px solid var(--secondary); }
        .logo-placeholder { font-weight: bold; font-size: 1.2rem; color: var(--accent); }
        .menu-item { padding: 15px 20px; cursor: pointer; border-bottom: 1px solid #3e4f5f; transition: 0.3s; }
        .menu-item:hover { background: var(--secondary); }
        .submenu { padding-left: 35px; font-size: 0.9rem; background: #243342; display: none; }

        /* Forms & Tables */
        .page { padding: 30px; display: none; }
        .active-page { display: block; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<!-- 1 & 4: Login & Forgot Password -->
<div id="login-overlay">
    <div class="login-box">
        <div class="logo-placeholder">🏥 Chapeco HMS</div>
        <h3>Login</h3>
        <input type="text" placeholder="Username (Optional)"><br><br>
        <input type="password" placeholder="Password (Optional)"><br><br>
        <button onclick="handleLogin()">Login</button>
        <p><a href="#" onclick="alert('Contact Admin to reset password')">Forgot Password?</a></p>
    </div>
</div>

<!-- 5: Sidebar Navigation -->
<nav id="sidebar">
    <div class="logo-area">
        <div class="logo-placeholder">CHAPECO HMS</div>
    </div>
    <div class="menu-item" onclick="showPage('reg-page')">Registration</div>
    <div class="menu-item" onclick="showPage('triage-page')">Triage</div>
    <div class="menu-item" onclick="showPage('doc-page')">Doctor</div>
    <div class="menu-item" onclick="toggleSubmenu('test-sub')">Tests ▾</div>
    <div id="test-sub" class="submenu">
        <div class="menu-item" onclick="showPage('test-page', 'Laboratory')">Laboratory</div>
        <div class="menu-item" onclick="showPage('test-page', 'X-Ray')">X-Ray</div>
        <div class="menu-item" onclick="showPage('test-page', 'CT Scan')">CT Scan</div>
        <div class="menu-item" onclick="showPage('test-page', 'MRI')">MRI</div>
        <div class="menu-item" onclick="showPage('test-page', 'Pharmacy')">Pharmacy</div>
    </div>
    <div class="menu-item" onclick="showPage('reports-page')">Reports</div>
</nav>

<!-- Main Content Area -->
<main id="main-content">
    
    <!-- Registration Page -->
    <div id="reg-page" class="page">
        <h2>Patient Registration</h2>
        <div class="form-group">
            <label>First Name</label><input type="text">
            <label>Middle Name</label><input type="text">
            <label>Last Name</label><input type="text">
            <label>ID Number</label><input type="text">
        </div>
        <div class="form-group">
            <label>Date of Birth</label>
            <input type="date" id="dob" onchange="calculateAge()">
            <p>Calculated Age: <span id="display-age">0</span> years</p>
        </div>
        <div class="form-group">
            <label>Insurance Type</label>
            <select>
                <option>Insurance</option>
                <option>SHA</option>
                <option>Cash</option>
            </select>
        </div>
    </div>

    <!-- Triage Page -->
    <div id="triage-page" class="page">
        <h2>Triage Unit</h2>
        <label>BP (mmHg)</label><input type="text" placeholder="120/80">
        <label>Temperature (°C)</label><input type="number" placeholder="36.5">
    </div>

    <!-- Doctor Page -->
    <div id="doc-page" class="page">
        <h2>Consultation</h2>
        <label>Symptoms & Signs</label>
        <textarea rows="4"></textarea>
        <label>Prescriptions</label>
        <textarea rows="4"></textarea>
    </div>

    <!-- Generic Test Upload Page -->
    <div id="test-page" class="page">
        <h2 id="test-title">Test Component</h2>
        <label>Upload Document/Result</label>
        <input type="file">
    </div>

    <div id="reports-page" class="page">
        <h2>System Reports</h2>
        <p>No reports generated for today.</p>
    </div>

</main>
