<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chapeco HMS - Final Loop Fix</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); display: flex; height: 100vh; overflow: hidden; }
        
        /* Login */
        #login-overlay { position: fixed; inset: 0; background: var(--primary); display: flex; justify-content: center; align-items: center; z-index: 10000; }
        .login-box { background: white; padding: 2.5rem; border-radius: 12px; text-align: center; width: 350px; }
        .login-box input { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }

        /* Sidebar */
        #sidebar { width: 240px; background: var(--primary); color: white; display: none; flex-direction: column; }
        #main-content { flex: 1; display: none; overflow-y: auto; padding: 25px; box-sizing: border-box; }
        .menu-item { padding: 15px 25px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .menu-item:hover { background: #34495e; }
        .submenu { padding-left: 30px; background: #1a252f; display: none; }

        /* UI */
        .form-row { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 15px; background: white; padding: 20px; border-radius: 8px; border: 1px solid #ddd; }
        .locked { opacity: 0.6; pointer-events: none; background: #f9f9f9; }
        .field-group { flex: 1; min-width: 180px; }
        label { display: block; font-weight: 600; margin-bottom: 5px; font-size: 0.85rem; }
        input, select, textarea { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        
        button { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-blue { background: var(--accent); color: white; }
        .btn-green { background: var(--success); color: white; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        .link-text { color: var(--accent); cursor: pointer; font-weight: bold; text-decoration: underline; }
        .view-panel { background: #fff9c4; padding: 15px; border: 1px solid #fbc02d; border-radius: 6px; margin-bottom: 15px; font-size: 0.9rem; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <h1 style="color: var(--primary)">Chapeco HMS</h1>
        <input type="text" placeholder="Username"><input type="password" placeholder="Password">
        <button class="btn-blue" style="width:100%" onclick="doLogin()">LOGIN</button>
    </div>
</div>

<nav id="sidebar">
    <div style="padding:20px; font-weight:bold; color:var(--accent)">CHAPECO HMS</div>
    <div class="menu-item" onclick="showP('reg-page')">Registration</div>
    <div class="menu-item" onclick="showP('triage-page')">Triage</div>
    <div class="menu-item" onclick="showP('doc-page')">Doctor</div>
    <div class="menu-item" onclick="toggleSub('test-sub')">Tests ▾</div>
    <div id="test-sub" class="submenu">
        <div class="menu-item" onclick="showP('test-page', 'Laboratory')">Laboratory</div>
        <div class="menu-item" onclick="showP('test-page', 'MRI')">MRI</div>
        <div class="menu-item" onclick="showP('test-page', 'CT Scan')">CT Scan</div>
        <div class="menu-item" onclick="showP('test-page', 'X-Ray')">X-Ray</div>
        <div class="menu-item" onclick="showP('test-page', 'Pharmacy')">Pharmacy</div>
    </div>
</nav>

<main id="main-content">
    <!-- Registration -->
    <div id="reg-page" class="page" style="display:block">
        <h2>Registration <button onclick="resetReg()" style="float:right">+</button></h2>
        <div id="reg-form" class="form-row">
            <div class="field-group"><label>First Name</label><input type="text" id="fn"></div>
            <div class="field-group"><label>Last Name</label><input type="text" id="ln"></div>
            <div class="field-group"><label>ID #</label><input type="text" id="rid"></div>
            <div class="field-group"><label>DOB</label><input type="date" id="dob" onchange="ageCalc()"></div>
            <div class="field-group"><label>Age</label><input type="text" id="age" readonly></div>
            <div class="field-group"><label>Insurance</label><select id="ins"><option>Cash</option><option>SHA</option><option>Insurance</option></select></div>
        </div>
        <button class="btn-blue" onclick="saveReg()">Save & Send</button>
        <table id="reg-tbl"><thead><tr><th>ID</th><th>Name</th><th>Action</th></tr></thead><tbody></tbody></table>
    </div>

    <!-- Triage -->
    <div id="triage-page" class="page" style="display:none">
        <h2>Triage</h2>
        <table id="tri-tbl"><thead><tr><th>ID</th><th>Name</th></tr></thead><tbody></tbody></table>
        <div id="tri-form" style="display:none"><div class="view-panel" id="tri-v"></div><div class="form-row"><div class="field-group"><label>BP</label><input type="text" id="bp"></div><div class="field-group"><label>Temp</label><input type="text" id="temp"></div></div><button class="btn-green" onclick="sendToDoc()">Send</button></div>
    </div>

    <!-- Doctor -->
    <div id="doc-page" class="page" style="display:none">
        <h2>Doctor</h2>
        <table id="doc-tbl"><thead><tr><th>ID</th><th>Name</th><th>Status</th></tr></thead><tbody></tbody></table>
        <div id="doc-form" style="display:none">
            <div class="view-panel" id="doc-v"></div>
            <div class="form-row">
                <div class="field-group"><label>Symptoms</label><textarea id="sym"></textarea></div>
                <div class="field-group"><label>Recommendation</label>
                    <select id="rec">
                        <option value="">None</option>
                        <option value="Laboratory">Laboratory</option>
                        <option value="MRI">MRI</option>
                        <option value="CT Scan">CT Scan</option>
                        <option value="X-Ray">X-Ray</option>
                        <option value="Pharmacy">Pharmacy</option>
                    </select>
                </div>
                <div class="field-group"><label>Prescriptions</label><textarea id="pre"></textarea></div>
            </div>
            <button class="btn-blue" onclick="docSave()">Save</button><button class="btn-green" onclick="docSend()">Send</button>
        </div>
    </div>

    <!-- Departments -->
    <div id="test-page" class="page" style="display:none">
        <h2 id="test-title">Department Queue</h2>
        <table id="test-tbl"><thead><tr><th>ID</th><th>Name</th><th>Request</th></tr></thead><tbody></tbody></table>
        <div id="test-form" style="display:none">
            <div class="view-panel" id="test-v"></div>
            <div class="form-row"><div class="field-group"><label>Upload Report</label><input type="file" id="test-file"></div></div>
            <button class="btn-green" onclick="completeTest()">Upload & Send to Doctor</button>
        </div>
    </div>
</main>

<script>
    let patients = [];
    let curIdx = null;
    let activeDept = '';

    function doLogin() { document.getElementById('login-overlay').style.display='none'; document.getElementById('sidebar').style.display='flex'; document.getElementById('main-content').style.display='block'; }
    function toggleSub(id) { let s = document.getElementById(id); s.style.display = s.style.display === 'block' ? 'none' : 'block'; }
    
    function showP(id, t='') {
        document.querySelectorAll('.page').forEach(p => p.style.display='none');
        document.getElementById(id).style.display='block';
        if(t) { 
            activeDept = t; // SYNCED: Matches dropdown exactly
            document.getElementById('test-title').innerText = t + " Department"; 
            document.getElementById('test-form').style.display = 'none'; 
            updateTestTbl(); 
        }
        if(id === 'doc-page') { updateDocTbl(); document.getElementById('doc-form').style.display='none'; }
    }

    // REGISTRATION
    function ageCalc() { let b = new Date(document.getElementById('dob').value); document.getElementById('age').value = new Date().getFullYear() - b.getFullYear(); }
    function resetReg() { document.getElementById('reg-form').classList.remove('locked'); document.querySelectorAll('#reg-form input').forEach(i => i.value=''); }
    function saveReg() {
        let p = { id: document.getElementById('rid').value, name: document.getElementById('fn').value + ' ' + document.getElementById('ln').value, age: document.getElementById('age').value, status: 'At Triage', file: null };
        patients.push(p); document.getElementById('reg-form').classList.add('locked'); updateRegTbl();
    }
    function updateRegTbl() {
        let b = document.querySelector('#reg-tbl tbody'); b.innerHTML = '';
        patients.forEach((p, i) => b.innerHTML += `<tr><td>${p.id}</td><td>${p.name}</td><td><span class="link-text" onclick="curIdx=${i}; document.getElementById('reg-form').classList.remove('locked')">✎</span></td></tr>`);
    }

    // TRIAGE
    function updateTriTbl() {
        let b = document.querySelector('#tri-tbl tbody'); b.innerHTML = '';
        patients.forEach((p, i) => { if(p.status === 'At Triage') b.innerHTML += `<tr><td>${p.id}</td><td class="link-text" onclick="curIdx=${i}; document.getElementById('tri-v').innerText='Bio: '+patients[${i}].name; document.getElementById('tri-form').style.display='block';">${p.name}</td></tr>`; });
    }
    function sendToDoc() { patients[curIdx].bp = document.getElementById('bp').value; patients[curIdx].temp = document.getElementById('temp').value; patients[curIdx].status = 'At Doctor'; document.getElementById('tri-form').style.display='none'; }

    // DOCTOR
    function updateDocTbl() {
        let b = document.querySelector('#doc-tbl tbody'); b.innerHTML = '';
        patients.forEach((p, i) => { if(p.status === 'At Doctor') b.innerHTML += `<tr><td>${p.id}</td><td class="link-text" onclick="openDoc(${i})">${p.name}</td><td>${p.file ? '✅ Ready' : 'Pending'}</td></tr>`; });
    }
    function openDoc(i) {
        curIdx = i; let p = patients[i];
        let fileLink = p.file ? `<br><a href="#" class="link-text">📎 Download Results: ${p.file}</a>` : '';
        document.getElementById('doc-v').innerHTML = `<b>Patient:</b> ${p.name} | BP: ${p.bp} | Temp: ${p.temp}${fileLink}`;
        document.getElementById('doc-form').style.display='block';
    }
    function docSave() { let p = patients[curIdx]; p.sym = document.getElementById('sym').value; p.pre = document.getElementById('pre').value; p.rec = document.getElementById('rec').value; alert("Progress Saved"); }
    function docSend() { if(patients[curIdx].rec) { patients[curIdx].status = 'At Test'; alert("Sent to " + patients[curIdx].rec); } else { patients[curIdx].status = 'Completed'; } document.getElementById('doc-form').style.display='none'; }

    // DEPARTMENT TEST QUEUE
    function updateTestTbl() {
        let b = document.querySelector('#test-tbl tbody'); b.innerHTML = '';
        patients.forEach((p, i) => { 
            // FIXED: Ensuring strict string comparison for department matching
            if(p.status === 'At Test' && p.rec === activeDept) {
                b.innerHTML += `<tr><td>${p.id}</td><td class="link-text" onclick="openTest(${i})">${p.name}</td><td>Doctor Consultation</td></tr>`;
            }
        });
    }
    function openTest(i) {
        curIdx = i; let p = patients[i];
        document.getElementById('test-v').innerHTML = `<b>Instructions:</b><br>Symptoms: ${p.sym}<br>Request: ${p.pre}`;
        document.getElementById('test-form').style.display='block';
    }
    function completeTest() {
        patients[curIdx].file = "Result_" + patients[curIdx].id + ".pdf";
        patients[curIdx].status = 'At Doctor';
        document.getElementById('test-form').style.display='none';
        alert("Results Uploaded and sent back to Doctor Consultation.");
        updateTestTbl();
    }
</script>
</body>
</html>
